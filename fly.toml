# fly.toml file generated for ytdl-api on 2023-04-02T22:31:44+02:00

app = "ytdl-api"
kill_signal = "SIGINT"
kill_timeout = 5
primary_region = "waw"
processes = []

[env]

[experimental]
  auto_rollback = true

[[services]]
  http_checks = []
  internal_port = 80
  processes = ["app"]
  protocol = "tcp"
  script_checks = []
  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"
    restart_limit = 3

[mounts]
  source="media"
  destination="/media"